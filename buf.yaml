version: v2
modules:
  - path: proto
lint:
  use:
    - STANDARD
  except:
    # We use v1 suffix on package, not file.
    - PACKAGE_VERSION_SUFFIX
    # Service names are `AquascapeApi`, `SimService` — we allow both styles.
    - SERVICE_SUFFIX
    # `Frame` is reused across streaming RPCs — fine for our shape.
    - RPC_REQUEST_RESPONSE_UNIQUE
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
breaking:
  use:
    - FILE
